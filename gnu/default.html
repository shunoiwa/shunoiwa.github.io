<!-- このファイルがひな形 -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Gnuplot備忘録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <!-- 共通CSS -->
  <link rel="stylesheet" href="../style.css">
</head>

<body>
<div class="container">

  <!-- サイドバー -->
  <aside class="sidebar">
    <h1>ナビゲーション</h1>

    <ul class="nav">
      <li><a href="../index.html">ホーム</a></li>
      <li><a href="../res.html">研究</a></li>

      <li>
        <a href="gnu.html">Gnuplot備忘録</a>
        <ul class="subnav" id="gnu-nav">
          <!-- JSで生成 -->
        </ul>
      </li>
    </ul>
  </aside>

  <!-- ここから編集OK -->
  <main class="main">
    <h1>A-B. TTTT</h1>

    <h2>小見出し</h2>
      <p>
        文章
      </p>
      <pre><code>
        plot xxx, \
            yyy
      </code></pre>

    <div class="card">
      ポイント
    </div>

  </main>

</div>

<script>
fetch("gnu_list.json")
  .then(res => res.json())
  .then(data => {
    const nav = document.getElementById("gnu-nav");

    data.forEach(chapter => {
      // ===== 章 =====
      const li = document.createElement("li");

      const title = document.createElement("div");
      title.textContent = "第" + chapter.chapter + "章: " + chapter.title;
      title.style.fontWeight = "bold";
      title.style.marginTop = "10px";

      li.appendChild(title);

      // ===== ページリスト =====
      const ul = document.createElement("ul");
      ul.classList.add("subnav");

      chapter.pages.forEach(page => {
        const subLi = document.createElement("li");
        const a = document.createElement("a");

        const num = page.file.match(/(\d+-\d+)/)[1];

        a.href = page.file;
        a.textContent = num + ". " + page.title;

        subLi.appendChild(a);
        ul.appendChild(subLi);
      });

      li.appendChild(ul);
      nav.appendChild(li);
    });
  })
  .catch(err => {
    console.error("JSON読み込み失敗:", err);
  });
</script>

</body>
</html>
