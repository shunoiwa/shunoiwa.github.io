<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>販売曲リスト</title>
<link rel="icon" type="image/jpeg" href="../cpi.jpg">
<link rel="apple-touch-icon" href="../cpi.jpg">
<style>
:root {
    color-scheme: light;
    --bg: #f7f9fc;
    --ink: #172033;
    --muted: #64748b;
    --line: #d8e1ee;
    --panel: #ffffff;
    --blue: #2563eb;
    --blue-dark: #1e40af;
    --blue-soft: #eff6ff;
    --green: #0f766e;
    --gold: #b7791f;
    --shadow: 0 16px 38px rgba(30, 41, 59, 0.11);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", "Segoe UI", sans-serif;
    font-weight: 400;
    color: var(--ink);
    background:
        linear-gradient(180deg, rgba(239, 246, 255, 0.9), rgba(247, 249, 252, 0.65) 260px),
        var(--bg);
}

button,
input,
select {
    font: inherit;
}

button {
    border: 0;
}

a {
    color: inherit;
}

.site-header {
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid rgba(216, 225, 238, 0.9);
    background: rgba(247, 249, 252, 0.88);
    backdrop-filter: blur(14px);
}

.nav-wrap {
    width: min(1180px, calc(100% - 32px));
    min-height: 72px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 22px;
}

.brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    font-weight: 650;
}

.brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: block;
    object-fit: cover;
    border: 1px solid rgba(23, 32, 51, 0.12);
}

.nav-links {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    flex-wrap: wrap;
}

.nav-links a {
    padding: 8px 10px;
    border-radius: 7px;
    color: #334155;
    font-size: 0.92rem;
    text-decoration: none;
}

.nav-links a:hover,
.nav-links a.is-current {
    background: #e8eef8;
    color: var(--blue-dark);
}

.page-shell {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 34px 0 56px;
}

.topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 22px;
}

.eyebrow {
    margin: 0 0 6px;
    color: var(--blue-dark);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: uppercase;
}

h1 {
    margin: 0;
    font-size: clamp(2rem, 6vw, 3.9rem);
    font-weight: 500;
    line-height: 1;
    letter-spacing: 0;
}

.subtitle {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.98rem;
}

.language-switch {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
    background: #e2e8f0;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
}

.language-switch button {
    min-width: 48px;
    padding: 8px 12px;
    border-radius: 6px;
    background: transparent;
    color: #334155;
    font-weight: 600;
    cursor: pointer;
}

.language-switch button.is-active {
    background: var(--panel);
    color: var(--blue-dark);
    box-shadow: 0 2px 9px rgba(15, 23, 42, 0.12);
}

#filter-area {
    display: flex;
    flex-direction: column;
    gap: 15px;
    justify-content: center;
    background: var(--blue-soft);
    border: 1px solid #bfdbfe;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    margin-bottom: 24px;
}

.filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

#instrument-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

#instrument-boxes {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    max-height: 180px;
    overflow-y: auto;
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #93c5fd;
}

label {
    font-weight: 600;
    color: var(--blue-dark);
}

.checkbox-label,
.radio-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
    color: #1f2937;
}

input[type="text"],
select {
    padding: 7px 10px;
    border: 1px solid #93c5fd;
    border-radius: 6px;
    outline: none;
    background: #fff;
}

input[type="text"] {
    min-width: min(280px, 100%);
}

input[type="checkbox"] {
    transform: scale(1.1);
}

input:focus,
select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 4px rgba(37,99,235,0.3);
}

.filter-button {
    background: #3b82f6;
    color: white;
    border-radius: 6px;
    padding: 6px 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

.filter-button:hover {
    background: var(--blue);
}

.mode-label {
    margin-left: 10px;
    font-weight: 600;
    color: var(--blue-dark);
}

.result-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin: 0 0 18px;
    color: var(--muted);
    font-weight: 500;
}

.section {
    margin-top: 28px;
}

.section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
}

.section-title {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 500;
    letter-spacing: 0;
}

.section-count {
    color: var(--muted);
    font-weight: 500;
}

.song-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
}

.song-item {
    min-width: 0;
}

.detail-row {
    grid-column: 1 / -1;
    min-width: 0;
}

.summary-card {
    width: 100%;
    min-height: 104px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    text-align: left;
    padding: 18px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel);
    box-shadow: 0 6px 20px rgba(30, 41, 59, 0.07);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    animation: cardIn 0.28s ease both;
}

.summary-card:hover,
.summary-card:focus-visible {
    border-color: #93c5fd;
    box-shadow: var(--shadow);
    transform: translateY(-2px);
    outline: none;
}

.summary-card.is-active {
    border-color: #60a5fa;
    background: #f8fbff;
    box-shadow: 0 10px 26px rgba(37, 99, 235, 0.13);
}

.summary-title {
    display: block;
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.45;
}

.summary-id {
    display: block;
    margin-top: 7px;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 500;
}

.summary-mark {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border-radius: 999px;
    background: #f1f5f9;
    color: var(--blue-dark);
    font-size: 1.35rem;
    font-weight: 500;
    transition: transform 0.18s ease, background 0.18s ease;
}

.summary-card.is-active .summary-mark {
    background: #dbeafe;
    transform: rotate(45deg);
}

.detail-card {
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    background: #fff;
    box-shadow: var(--shadow);
    animation: detailIn 0.26s ease both;
}

.detail-card[hidden],
.section[hidden],
#no-results[hidden] {
    display: none;
}

.detail-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
}

.detail-title {
    margin: 0;
    font-size: 1.22rem;
    font-weight: 500;
    line-height: 1.35;
}

.close-detail {
    flex: 0 0 auto;
    min-width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #e2e8f0;
    color: #0f172a;
    font-size: 1.15rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s ease, transform 0.18s ease;
}

.close-detail:hover {
    background: #cbd5e1;
    transform: translateY(-1px);
}

.detail-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
}

.info-block {
    min-width: 0;
    padding: 12px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #f8fafc;
}

.info-block.is-wide {
    grid-column: span 2;
}

.info-block.is-full {
    grid-column: 1 / -1;
}

.info-label {
    margin: 0 0 6px;
    color: var(--muted);
    font-size: 0.74rem;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: uppercase;
}

.info-value {
    margin: 0;
    font-weight: 500;
    overflow-wrap: anywhere;
}

.comment-text {
    white-space: pre-line;
}

.map-block.is-pending {
    display: none;
}

.map-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 10px;
    border: 1px solid #d8e1ee;
    border-radius: 8px;
    background: #fff;
}

.map-image {
    display: block;
    max-width: none;
    height: auto;
}

.party-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 8px;
    margin: 0;
}

.party-part {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px;
    align-items: start;
    padding: 9px 10px;
    border-radius: 6px;
    background: #fff;
    border: 1px solid #e2e8f0;
}

.part-number {
    color: var(--green);
    font-weight: 600;
}

.link-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.sell-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 104px;
    min-height: 38px;
    padding: 8px 13px;
    border-radius: 7px;
    text-decoration: none;
    font-weight: 600;
    border: 1px solid transparent;
    transition: transform 0.18s ease, filter 0.18s ease;
}

.sell-button:not(.is-disabled):hover {
    transform: translateY(-1px);
    filter: brightness(1.04);
}

.sell-button.youtube {
    background: #ff2b2b;
    color: #111827;
}

.sell-button.instagram {
    background: #d62976;
    color: #fff;
}

.sell-button.booth {
    background: #ef4444;
    color: #fff;
}

.sell-button.is-disabled {
    background: #cbd5e1;
    color: #64748b;
    cursor: not-allowed;
    pointer-events: none;
}

#no-results {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 600;
    color: #b91c1c;
    background: #fff1f2;
    border: 1px solid #fecdd3;
    border-radius: 8px;
    padding: 22px;
    margin-top: 22px;
}

.loading,
.error-message {
    padding: 28px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid var(--line);
    color: var(--muted);
    font-weight: 600;
    text-align: center;
}

.error-message {
    color: #b91c1c;
    background: #fff1f2;
    border-color: #fecdd3;
}

.notice-message {
    padding: 14px 16px;
    border-radius: 8px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    color: #92400e;
    font-weight: 600;
    margin-bottom: 18px;
}

.footer {
    border-top: 1px solid var(--line);
    background: #eef3fa;
}

.footer-inner {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 26px 0;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    color: #475467;
}

@keyframes cardIn {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes detailIn {
    from {
        opacity: 0;
        transform: translateY(-8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
    }
}

@media (max-width: 780px) {
    .nav-wrap {
        min-height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
    }

    .nav-links {
        justify-content: flex-start;
    }

    .page-shell {
        width: min(100% - 22px, 1180px);
        padding-top: 22px;
    }

    .topbar,
    .result-meta,
    .section-header,
    .detail-head {
        align-items: stretch;
        flex-direction: column;
    }

    .language-switch {
        align-self: flex-start;
    }

    .filter-row {
        align-items: stretch;
        flex-direction: column;
    }

    #instrument-controls {
        align-items: flex-start;
        flex-direction: column;
    }

    .mode-label {
        margin-left: 0;
    }

    .detail-grid {
        grid-template-columns: 1fr;
    }

    .info-block.is-wide,
    .info-block.is-full {
        grid-column: auto;
    }
}
</style>
</head>
<body>
<header class="site-header">
    <div class="nav-wrap">
        <a class="brand" href="../home.html"><img class="brand-mark" src="../cpi.jpg" alt="MUSIC WEAGHK"><span>MUSIC WEAGHK</span></a>
        <nav class="nav-links" aria-label="Main navigation">
            <a href="../home.html">ホーム</a>
            <a href="../scores.html">楽譜販売</a>
            <a href="../information.html">情報</a>
            <a class="is-current" href="songlist4.html">楽曲リスト</a>
            <a href="../notes.html">問題解決ノート</a>
            <a href="../bgm.html">BGM</a>
        </nav>
    </div>
</header>
<main class="page-shell">
    <div class="topbar">
        <div>
            <p class="eyebrow" data-i18n="eyebrow">MUSIC WEAGHK</p>
            <h1 data-i18n="pageTitle">販売曲リスト</h1>
            <p class="subtitle" data-i18n="subtitle">編成から探して、詳細と販売リンクを確認できます。</p>
        </div>
        <div class="language-switch" aria-label="Language">
            <button type="button" class="is-active" data-lang="ja">JA</button>
            <button type="button" data-lang="en">EN</button>
        </div>
    </div>

    <div id="filter-area">
        <div class="filter-row">
            <label for="filter-title" data-i18n="titleFilter">曲名：</label>
            <input type="text" id="filter-title" placeholder="例：祈り">
            <label for="filter-id" data-i18n="idFilter">ID：</label>
            <input type="text" id="filter-id" placeholder="例：PER0001">
        </div>
        <div class="filter-row">
            <label for="filter-difficulty" data-i18n="difficultyFilter">難易度：</label>
            <select id="filter-difficulty">
                <option value="" data-i18n="allDifficulties">すべて</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="G">G</option>
            </select>
            <label for="filter-size" data-i18n="sizeFilter">楽器数：</label>
            <select id="filter-size">
                <option value="" data-i18n="allSizes">すべて</option>
            </select>
            <label for="filter-duration" data-i18n="durationFilter">演奏時間：</label>
            <select id="filter-duration">
                <option value="" data-i18n="allDurations">すべて</option>
                <option value="short" data-i18n="durationShort">短め（～3:00）</option>
                <option value="normal" data-i18n="durationNormal">普通（3:00～6:00）</option>
                <option value="long" data-i18n="durationLong">長め（6:00～）</option>
            </select>
        </div>

        <div class="filter-row">
            <label data-i18n="instrumentFilter">楽器：</label>
            <div style="flex: 1;">
                <div id="instrument-controls">
                    <button type="button" class="filter-button" id="select-all" data-i18n="selectAll">全選択</button>
                    <button type="button" class="filter-button" id="clear-all" data-i18n="clearAll">全解除</button>
                    <span class="mode-label" data-i18n="mode">モード：</span>
                    <label class="radio-label">
                        <input type="radio" name="logic-mode" value="OR" checked>
                        <span data-i18n="orMode">OR（いずれかを含む）</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="logic-mode" value="AND">
                        <span data-i18n="andMode">AND（すべて含む）</span>
                    </label>
                </div>
                <div id="instrument-boxes"></div>
            </div>
        </div>
    </div>

    <div class="result-meta">
        <span id="result-count">0 pieces</span>
        <span id="active-filters"></span>
    </div>

    <div id="loading" class="loading" data-i18n="loading">読み込み中...</div>
    <div id="notice-message" class="notice-message" hidden></div>
    <div id="error-message" class="error-message" hidden></div>
    <div id="no-results" hidden data-i18n="noResults">該当する曲がありません</div>

    <section class="section" id="solo-section" hidden>
        <div class="section-header">
            <h2 class="section-title">SOLO &amp; DUO</h2>
            <span class="section-count" id="solo-count">0</span>
        </div>
        <div class="song-list" id="solo-list"></div>
    </section>

    <section class="section" id="ensemble-section" hidden>
        <div class="section-header">
            <h2 class="section-title">ENSEMBLE</h2>
            <span class="section-count" id="ensemble-count">0</span>
        </div>
        <div class="song-list" id="ensemble-list"></div>
    </section>
</main>
<footer class="footer">
    <div class="footer-inner">
        <span>MUSIC WEAGHK</span>
        <span>Contact: shunoiwa[at]じーめーるどっとこむ (スパム除け)</span>
    </div>

        durationLong: "Long (6:00+)",
        instrumentFilter: "Instrument:",
        selectAll: "Select all",
        clearAll: "Clear all",
        mode: "Mode:",
        orMode: "OR (any selected)",
        andMode: "AND (all selected)",
        loading: "Loading...",
        localFallback: "Opened as a local file, so the embedded backup data is being displayed. Published pages will load the JSON files.",
        noResults: "No pieces found",
        pieceCount: count => `${count} piece${count === 1 ? "" : "s"}`,
        activeFilters: count => count ? `${count} instrument filter${count === 1 ? "" : "s"}` : "No instrument filters",
        id: "Song ID",
        formTitle: "Instrumentation and Title",
        duration: "Duration",
        difficulty: "Difficulty",
        party: "Detailed Instrumentation",
        links: "Video and Shop Links",
        price: "Price",
        map: "Map",
        comment: "Comment",
        notOnSale: "Not on sale",
        close: "Close",
        loadError: "Could not load song data. Check the JSON file paths and format."
    }
};

const instrumentList = [
    "Piccolo","Flute","Alto Flute","E♭ Clarinet","B♭ Clarinet","Alto Clarinet","Bass Clarinet",
    "Oboe","English Horn","Bassoon","Contrabassoon",
    "Soprano Saxophone","Alto Saxophone","Tenor Saxophone","Baritone Saxophone","Bass Saxophone",
    "Piccolo Trumpet","Trumpet","Cornet","Trombone","Bass Trombone","Horn","Flugel Horn","Euphonium","Tuba",
    "Violin","Viola","Violoncello","Contrabass","Percussions"
];

const percussionGroup = [
    "Marimba","Xylophone","Vibraphone","Glockenspiel","Chime","Timpani",
    "Drumset","Cymbal","Toms","Bass Drum","Snare Drum","Tam-Tam",
    "Triangle","Tambourine"
];

const ensembleNamesEn = {
    1: "Solo",
    2: "Duo",
    3: "Trio",
    4: "Quartet",
    5: "Quintet",
    6: "Sextet",
    7: "Septet",
    8: "Octet",
    9: "Nonet",
    10: "Decet"
};

const state = {
    lang: "ja",
    songs: [],
    formNames: { ja: {}, en: {} },
    openId: null
};

document.addEventListener("DOMContentLoaded", init);

async function init() {
    buildInstrumentCheckboxes();
    bindControls();
    updateStaticText();

    try {
        const [songs, hyp, usedFallback] = await loadData();
        const formData = hyp.find(item => item.kind === "form") || {};
        state.songs = songs;
        state.formNames = {
            ja: formData.ja || {},
            en: formData.en || {}
        };
        document.getElementById("loading").hidden = true;
        if (usedFallback) {
            showNotice(t("localFallback"));
        }
        filterTable();
    } catch (error) {
        console.error(error);
        document.getElementById("loading").hidden = true;
        const errorBox = document.getElementById("error-message");
        errorBox.textContent = t("loadError");
        errorBox.hidden = false;
    }
}

async function loadData() {
    try {
        const [songs, hyp] = await Promise.all([
            fetchJson("songdatas.json"),
            fetchJson("hyp.json")
        ]);
        return [songs, hyp, false];
    } catch (error) {
        const songs = parseFallbackJson("songdatas-fallback");
        const hyp = parseFallbackJson("hyp-fallback");
        if (songs.length && hyp.length) {
            return [songs, hyp, true];
        }
        throw error;
    }
}

async function fetchJson(path) {
    const response = await fetch(path, { cache: "no-store" });
    if (!response.ok) {
        throw new Error(`${path}: ${response.status}`);
    }
    return response.json();
}

function parseFallbackJson(id) {
    const node = document.getElementById(id);
    if (!node) {
        return [];
    }
    return JSON.parse(node.textContent || "[]");
}

function showNotice(message) {
    const notice = document.getElementById("notice-message");
    notice.textContent = message;
    notice.hidden = false;
}

function bindControls() {
    document.querySelectorAll("[data-lang]").forEach(button => {
        button.addEventListener("click", () => {
            state.lang = button.dataset.lang;
            document.documentElement.lang = state.lang;
            document.querySelectorAll("[data-lang]").forEach(btn => {
                btn.classList.toggle("is-active", btn.dataset.lang === state.lang);
            });
            updateStaticText();
            filterTable();
        });
    });

    document.getElementById("select-all").addEventListener("click", () => {
        document.querySelectorAll("#instrument-boxes input").forEach(cb => cb.checked = true);
        filterTable();
    });

    document.getElementById("clear-all").addEventListener("click", () => {
        document.querySelectorAll("#instrument-boxes input").forEach(cb => cb.checked = false);
        filterTable();
    });

    document.querySelectorAll('input[name="logic-mode"]').forEach(radio => {
        radio.addEventListener("change", filterTable);
    });

    document.getElementById("filter-title").addEventListener("input", filterTable);
    document.getElementById("filter-id").addEventListener("input", filterTable);
    document.getElementById("filter-difficulty").addEventListener("change", filterTable);
    document.getElementById("filter-size").addEventListener("change", filterTable);
    document.getElementById("filter-duration").addEventListener("change", filterTable);
}

function buildInstrumentCheckboxes() {
    const box = document.getElementById("instrument-boxes");
    instrumentList.forEach(inst => {
        const label = document.createElement("label");
        label.className = "checkbox-label";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = inst;
        cb.addEventListener("change", filterTable);
        label.appendChild(cb);
        label.appendChild(document.createTextNode(inst));
        box.appendChild(label);
    });
}

function updateStaticText() {
    document.querySelectorAll("[data-i18n]").forEach(node => {
        node.textContent = t(node.dataset.i18n);
    });
    document.getElementById("filter-title").placeholder = t("titlePlaceholder");
    document.getElementById("filter-id").placeholder = t("idPlaceholder");
    updateSizeOptions();
}

function updateSizeOptions() {
    const select = document.getElementById("filter-size");
    const selected = select.value;
    select.textContent = "";

    const allOption = document.createElement("option");
    allOption.value = "";
    allOption.textContent = t("allSizes");
    select.appendChild(allOption);

    for (let count = 1; count <= 10; count += 1) {
        const option = document.createElement("option");
        option.value = String(count);
        option.textContent = state.lang === "ja" ? String(count) : ensembleNamesEn[count];
        select.appendChild(option);
    }

    select.value = selected;
}

function filterTable() {
    const title = document.getElementById("filter-title").value.trim().toLowerCase();
    const idQuery = document.getElementById("filter-id").value.trim().toUpperCase();
    const diff = document.getElementById("filter-difficulty").value;
    const size = document.getElementById("filter-size").value;
    const durationRange = document.getElementById("filter-duration").value;
    const checked = [...document.querySelectorAll("#instrument-boxes input:checked")].map(c => c.value);
    const mode = document.querySelector('input[name="logic-mode"]:checked').value;

    let expanded = [...checked];
    if (checked.includes("Percussions")) {
        expanded = expanded.filter(x => x !== "Percussions").concat(percussionGroup);
    }

    const filtered = state.songs.filter(song => {
        const titlePool = [
            song.title?.ja || "",
            song.title?.en || "",
            formatHeading(song, "ja"),
            formatHeading(song, "en")
        ].join(" ").toLowerCase();
        const form = (song.party || []).join(" ");
        const level = difficultyLetter(song.difficulty);
        const songId = formatSongId(song).toUpperCase();

        let show = true;
        if (title && !titlePool.includes(title)) show = false;
        if (idQuery && !songId.includes(idQuery)) show = false;
        if (diff && level !== diff) show = false;
        if (size && effectivePartyCount(song) !== Number(size)) show = false;
        if (durationRange && !matchesDurationRange(song.duration, durationRange)) show = false;

        if (expanded.length > 0) {
            if (mode === "OR") {
                const match = expanded.some(inst => form.includes(inst));
                if (!match) show = false;
            } else {
                const matchAll = expanded.every(inst => form.includes(inst));
                if (!matchAll) show = false;
            }
        }

        return show;
    });

    renderSections(filtered, checked.length);
}

function matchesDurationRange(seconds, range) {
    const duration = Number(seconds) || 0;
    if (range === "short") {
        return duration <= 180;
    }
    if (range === "normal") {
        return duration > 180 && duration < 360;
    }
    if (range === "long") {
        return duration >= 360;
    }
    return true;
}

function renderSections(filtered, checkedCount) {
    const solo = filtered.filter(song => effectivePartyCount(song) <= 2);
    const ensemble = filtered.filter(song => effectivePartyCount(song) > 2);

    document.getElementById("result-count").textContent = t("pieceCount", filtered.length);
    document.getElementById("active-filters").textContent = t("activeFilters", checkedCount);
    document.getElementById("solo-count").textContent = t("pieceCount", solo.length);
    document.getElementById("ensemble-count").textContent = t("pieceCount", ensemble.length);

    renderSongList(document.getElementById("solo-list"), solo);
    renderSongList(document.getElementById("ensemble-list"), ensemble);

    document.getElementById("solo-section").hidden = solo.length === 0;
    document.getElementById("ensemble-section").hidden = ensemble.length === 0;
    document.getElementById("no-results").hidden = filtered.length !== 0;
}

function renderSongList(container, songs) {
    container.textContent = "";
    const fragment = document.createDocumentFragment();
    songs.forEach(song => {
        fragment.appendChild(createSongItem(song));
        if (state.openId === formatSongId(song)) {
            const detailRow = document.createElement("div");
            detailRow.className = "detail-row";
            detailRow.appendChild(createDetailCard(song));
            fragment.appendChild(detailRow);
        }
    });
    container.appendChild(fragment);
}

function createSongItem(song) {
    const id = formatSongId(song);
    const item = document.createElement("article");
    item.className = "song-item";
    item.dataset.songId = id;

    const summary = document.createElement("button");
    summary.type = "button";
    summary.className = "summary-card";
    summary.classList.toggle("is-active", state.openId === id);
    summary.setAttribute("aria-expanded", state.openId === id ? "true" : "false");
    summary.innerHTML = `
        <span>
            <span class="summary-title">${escapeHtml(formatHeading(song))}</span>
            <span class="summary-id">${escapeHtml(id)} / ${escapeHtml(formatDuration(song.duration))} / ${escapeHtml(difficultyLetter(song.difficulty))}</span>
        </span>
        <span class="summary-mark" aria-hidden="true">+</span>
    `;
    summary.addEventListener("click", () => {
        state.openId = state.openId === id ? null : id;
        filterTable();
    });

    item.appendChild(summary);
    return item;
}

function createDetailCard(song) {
    const id = formatSongId(song);
    const card = document.createElement("div");
    card.className = "detail-card";

    const heading = formatHeading(song);
    const title = escapeHtml(heading);
    card.innerHTML = `
        <div class="detail-head">
            <h3 class="detail-title">${title}</h3>
            <button type="button" class="close-detail" aria-label="${escapeHtml(t("close"))}">×</button>
        </div>
        <div class="detail-grid">
            ${infoBlock(t("id"), id)}
            ${infoBlock(t("duration"), formatDuration(song.duration))}
            ${infoBlock(t("difficulty"), difficultyLetter(song.difficulty))}
            ${infoBlock(t("price"), formatPrice(song.sells?.price))}
            ${infoBlock(t("formTitle"), formatHeading(song), "is-wide")}
            ${linksBlock(song.sells || {})}
            ${partyBlock(song.party || [])}
            ${mapBlock(id, heading)}
            ${commentBlock(song.comment)}
        </div>
    `;

    initMapBlock(card);

    card.querySelector(".close-detail").addEventListener("click", () => {
        if (state.openId === id) {
            state.openId = null;
        }
        filterTable();
    });

    return card;
}

function infoBlock(label, value, extraClass = "") {
    return `
        <div class="info-block ${extraClass}">
            <p class="info-label">${escapeHtml(label)}</p>
            <p class="info-value">${escapeHtml(value)}</p>
        </div>
    `;
}

function linksBlock(sells) {
    return `
        <div class="info-block is-wide">
            <p class="info-label">${escapeHtml(t("links"))}</p>
            <div class="link-row">
                ${linkButton("Youtube", sells.youtube, "youtube")}
                ${linkButton("Instagram", sells.instagram, "instagram")}
                ${linkButton("Booth", sells.booth, "booth")}
            </div>
        </div>
    `;
}

function linkButton(label, url, type) {
    if (!url) {
        return `<span class="sell-button ${type} is-disabled" aria-disabled="true">${escapeHtml(label)}</span>`;
    }
    return `<a class="sell-button ${type}" href="${escapeAttribute(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
}

function partyBlock(party) {
    const items = party.map((part, index) => `
        <div class="party-part">
            <span class="part-number">[${index + 1}]</span>
            <span>${escapeHtml(part)}</span>
        </div>
    `).join("");

    return `
        <div class="info-block is-full">
            <p class="info-label">${escapeHtml(t("party"))}</p>
            <div class="party-list">${items}</div>
        </div>
    `;
}

function mapBlock(id, title) {
    if (!id) {
        return "";
    }

    const src = `maps/${encodeURIComponent(id)}.svg`;
    return `
        <div class="info-block is-full map-block is-pending" data-map-block>
            <p class="info-label">${escapeHtml(t("map"))}</p>
            <div class="map-scroll">
                <img class="map-image" src="${escapeAttribute(src)}" alt="${escapeAttribute(`${t("map")}: ${title}`)}">
            </div>
        </div>
    `;
}

function initMapBlock(card) {
    const block = card.querySelector("[data-map-block]");
    const image = block?.querySelector(".map-image");
    if (!block || !image) {
        return;
    }

    image.addEventListener("load", () => {
        block.classList.remove("is-pending");
    }, { once: true });

    image.addEventListener("error", () => {
        block.remove();
    }, { once: true });

    if (image.complete) {
        if (image.naturalWidth === 0) {
            block.remove();
            return;
        }
        block.classList.remove("is-pending");
    }
}

function commentBlock(comment) {
    const text = formatComment(comment);
    if (!text) {
        return "";
    }

    return `
        <div class="info-block is-full">
            <p class="info-label">${escapeHtml(t("comment"))}</p>
            <p class="info-value comment-text">${escapeHtml(text)}</p>
        </div>
    `;
}

function formatComment(comment) {
    if (comment === null || comment === undefined || comment === "") {
        return "";
    }
    if (typeof comment === "string" || typeof comment === "number") {
        return String(comment);
    }
    if (Array.isArray(comment)) {
        return comment.filter(Boolean).join("\n");
    }
    if (typeof comment === "object") {
        return comment[state.lang] || comment.ja || comment.en || "";
    }
    return "";
}

function formatHeading(song, lang = state.lang) {
    const formCode = song.id?.form || "";
    const formName = state.formNames[lang]?.[formCode] || formCode;
    const title = song.title?.[lang] || song.title?.en || song.title?.ja || "";
    const count = effectivePartyCount(song);

    if (lang === "ja") {
        const size = count === 1 ? "独奏" : `${count}重奏`;
        return `${formName}${size}「${title}」`;
    }

    const size = ensembleNamesEn[count] || `${count}-part Ensemble`;
    return `${formName} ${size} - "${title}"`;
}

function effectivePartyCount(song) {
    const counted = (song.party || []).filter(part => !isAccompanimentPart(part)).length;
    return counted || (song.party || []).length;
}

function isAccompanimentPart(part) {
    return /\(accomp\.\)/i.test(String(part || ""));
}

function formatSongId(song) {
    const id = song.id || {};
    const base = `${id.form || ""}${String(id.number ?? "").padStart(4, "0")}`;
    return id.mov === null || id.mov === undefined ? base : `${base}-${id.mov}`;
}

function formatDuration(seconds) {
    const total = Number(seconds) || 0;
    const minutes = Math.floor(total / 60);
    const secs = String(total % 60).padStart(2, "0");
    return state.lang === "ja" ? `${minutes}分${secs}秒` : `${minutes}:${secs}`;
}

function difficultyLetter(value) {
    const number = Number(value);
    if (!Number.isFinite(number) || number < 1 || number > 7) {
        return "";
    }
    return String.fromCharCode(64 + number);
}

function formatPrice(price) {
    if (price === null || price === undefined || price === "") {
        return t("notOnSale");
    }
    return `￥${price}`;
}

function t(key, ...args) {
    const value = texts[state.lang][key] ?? texts.ja[key] ?? "";
    return typeof value === "function" ? value(...args) : value;
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function escapeAttribute(value) {
    return escapeHtml(value).replace(/`/g, "&#096;");
}
</script>
</body>
